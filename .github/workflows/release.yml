name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `Release ${context.ref.replace('refs/tags/', '')}`,
              draft: true,
              generate_release_notes: true
            })
            return data.id

      - name: Attach README.txt as release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" dmg-assets/README.txt --clobber

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: ''
            args: '--config src-tauri/tauri.windows.conf.json'
          - runner: macos-26
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install additional Rust target
        if: matrix.target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies (macOS)
        if: startsWith(matrix.runner, 'macos-')
        run: brew install opus

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CMAKE_POLICY_VERSION_MINIMUM: ${{ startsWith(matrix.runner, 'macos-') && '3.5' || '' }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      - name: Repack DMG with README.txt and re-upload
        if: startsWith(matrix.runner, 'macos-')
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          DMG=$(ls "$DMG_DIR"/*.dmg | head -n 1)
          echo "Repacking $DMG"

          # Mount the tauri-produced DMG read-only so we can read out its .app.
          # Let hdiutil auto-mount under /Volumes/<volname> so we can reuse the
          # original volume name for the rebuilt DMG.
          ATTACH_OUT=$(hdiutil attach "$DMG" -nobrowse -readonly -noverify)
          SRC_MOUNT=$(echo "$ATTACH_OUT" | awk '{ for (i=1; i<=NF; i++) if ($i ~ "^/Volumes/") m=$i } END { print m }')
          if [ -z "$SRC_MOUNT" ]; then
            echo "Failed to detect DMG mount point" >&2
            echo "$ATTACH_OUT" >&2
            exit 1
          fi
          VOLNAME=$(basename "$SRC_MOUNT")
          echo "Mounted at $SRC_MOUNT (volume: $VOLNAME)"

          # Copy the .app via ditto to preserve symlinks, xattrs and code
          # signatures, then unmount before rebuilding.
          STAGE=$(mktemp -d)
          for APP in "$SRC_MOUNT"/*.app; do
            ditto "$APP" "$STAGE/$(basename "$APP")"
          done
          hdiutil detach "$SRC_MOUNT" -quiet || hdiutil detach "$SRC_MOUNT" -force

          # Add README alongside the .app and an Applications symlink so the
          # DMG still offers the standard drag-to-install target.
          cp dmg-assets/README.txt "$STAGE/README.txt"
          ln -s /Applications "$STAGE/Applications"

          # Replace the original DMG. Rebuilding (instead of mounting rw +
          # copying in) sidesteps the tight filesystem tauri ships, which had
          # no free space left to `cp` the README into.
          rm -f "$DMG"
          hdiutil create -volname "$VOLNAME" -srcfolder "$STAGE" \
            -format UDZO -imagekey zlib-level=9 -ov "$DMG"

          gh release upload "$TAG" "$DMG" --clobber

  publish-release:
    runs-on: ubuntu-latest
    needs: [create-release, build]
    steps:
      - uses: actions/checkout@v4

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false
